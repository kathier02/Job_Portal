{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Auth</title>
    <link rel="stylesheet" href="{% static 'style/seek.css' %}">
</head>
<body>

<div class="container">

    <div class="top">
        <button type="button" class="switch-btn active" id="loginTab" onclick="showLogin()">Login</button>
        <button type="button" class="switch-btn" id="signupTab" onclick="showSignup()">Sign Up</button>
    </div>

  <!-- Login -->
    <div class="login-box" id="loginBox">
        <h2>Job Seeker Login</h2>

        <form method="POST" action="{% url 'jobseeker_auth' %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Signup -->
    <div class="signup-box" id="signupBox">
        <h2>Job Seeker Signup</h2>

        <form method="POST" action="{% url 'jobseeker_auth' %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="signup">

            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <p class="employer-link">
        <a href="{% url 'employer_auth' %}">Employer?</a>
    </p>

</div>

<script>
function showLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("signupBox").style.display = "none";
    document.getElementById("loginTab").classList.add("active");
    document.getElementById("signupTab").classList.remove("active");
}

function showSignup() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("signupBox").style.display = "block";
    document.getElementById("signupTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
}
</script>

</body>
</html>
